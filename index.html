<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDEA Campus</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a0133, #1c0f5e);
      color: white;
      min-height: 100vh;
    }

    /* CONTENEDOR GENERAL */
    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    /* TARJETA CENTRAL */
    .card {
      width: 100%;
      max-width: 520px;
      padding: 40px 25px;
    }

    /* LOGO */
    .logo {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    /* TITULO */
    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 15px;
      font-weight: 600;
    }

    /* TEXTO */
    p {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      line-height: 1.6;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    /* BOTON */
    .btn {
      display: inline-block;
      background: #25D366;
      color: white;
      padding: 16px 30px;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      border-radius: 999px;
      margin-top: 20px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn:hover {
      background: #1ebe5d;
      transform: scale(1.05);
    }

    /* 📱 MOBILE EXTRA AJUSTE */
    @media (max-width: 480px) {
      .card {
        padding: 30px 15px;
      }

      .btn {
        width: 100%;
        padding: 18px;
      }
    }

  </style>
</head>

<body>

  <div class="container">
    <div class="card">

      <div class="logo">💡</div>

      <h1>IDEA Campus</h1>

      <p>Estamos trabajando en nuestra plataforma educativa.</p>
      <p>Muy pronto estará disponible 🚀</p>

      <a class="btn" href="https://wa.me/18099951312" target="_blank">
        Contactar por WhatsApp
      </a>

    </div>
  </div>

</body>
</html>
